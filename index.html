<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flip Runner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

/* ═══════════════════════════════════════════
   FLIP RUNNER v5 — Polish & Balance Update
   New: 4 chars, 6 skins, 3 bgs, cleaner shop,
   stronger abilities, smooth transitions
═══════════════════════════════════════════ */
:root{
  --bg:#0a0a0f; --primary:#00f5a0; --accent:#ff3864;
  --surface:#12121a; --s2:#181826; --s3:#1e1e30;
  --text:#e8e8f0; --muted:#506060; --dim:#2a2a42;
  --gold:#ffcc00; --cyan:#00cfff; --purple:#a855f7;
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;}
body{background:var(--bg);font-family:'Space Mono',monospace;display:flex;align-items:center;justify-content:center;}

/* ── Layout ── */
#wrapper{position:relative;width:100vw;height:100vh;overflow:hidden;}
canvas{display:block;position:absolute;top:50%;left:50%;image-rendering:pixelated;}
#ui{position:absolute;inset:0;pointer-events:none;overflow:hidden;}

/* ═══════════════════════════════════════════
   IMPROVED BUTTONS — depth + gradient + press
═══════════════════════════════════════════ */
.btn{
  background:linear-gradient(135deg,#00f5a0 0%,#00cc88 100%);
  color:#030f09; border:none; border-radius:8px;
  padding:11px 28px; font-family:'Space Mono',monospace;
  font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; pointer-events:all;
  box-shadow:0 4px 16px rgba(0,245,160,0.35), 0 1px 0 rgba(255,255,255,0.15) inset, 0 -2px 0 rgba(0,0,0,0.3) inset;
  transition:transform 0.1s, box-shadow 0.15s, filter 0.15s;
  position:relative; overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent 60%);border-radius:8px;pointer-events:none;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,245,160,0.5),0 1px 0 rgba(255,255,255,0.15) inset,0 -2px 0 rgba(0,0,0,0.3) inset;filter:brightness(1.08);}
.btn:active{transform:scale(0.95) translateY(1px);box-shadow:0 2px 8px rgba(0,245,160,0.3);filter:brightness(0.95);}
.btn.sec{background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--dim);box-shadow:0 2px 8px rgba(0,0,0,0.3);background-image:none;}
.btn.sec::after{display:none;}
.btn.sec:hover{border-color:var(--primary);color:var(--primary);background:rgba(0,245,160,0.05);box-shadow:0 0 16px rgba(0,245,160,0.15);}
.btn.gold-btn{background:linear-gradient(135deg,#ffcc00,#e0a800);color:#1a1000;box-shadow:0 4px 16px rgba(255,204,0,0.35),0 1px 0 rgba(255,255,255,0.2) inset;}
.btn.gold-btn:hover{box-shadow:0 6px 22px rgba(255,204,0,0.5);}
.btn.acc-btn{background:linear-gradient(135deg,#ff3864,#cc1a40);color:#fff;box-shadow:0 4px 16px rgba(255,56,100,0.35);}

/* ═══════════════════════════════════════════
   SCREEN TRANSITIONS — smooth fade+scale
═══════════════════════════════════════════ */
.screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;pointer-events:all;
  transition:opacity 0.4s cubic-bezier(0.4,0,0.2,1), transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(0.96) translateY(8px);}
.screen.slide-left{transform:translateX(-4%);}
.screen.slide-right{transform:translateX(4%);}

/* ── Start Screen ── */
#start-screen{background:radial-gradient(ellipse at 50% 55%,#141422 0%,#0a0a0f 68%);}
.title-eyebrow{font-size:10px;letter-spacing:7px;color:var(--muted);text-transform:uppercase;}
.title-main{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,13vw,96px);color:var(--text);line-height:0.88;letter-spacing:6px;}
.title-main span{color:var(--primary);text-shadow:0 0 30px rgba(0,245,160,0.7),0 0 60px rgba(0,245,160,0.3),0 0 100px rgba(0,245,160,0.15);}
.title-sub{font-size:9px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;}

#menu-currency{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--dim);border-radius:30px;padding:8px 18px;pointer-events:all;box-shadow:0 0 20px rgba(255,204,0,0.08);}
#menu-cur-v{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:2px;text-shadow:0 0 12px rgba(255,204,0,0.4);}
.flux-icon-sm{width:16px;height:16px;flex-shrink:0;}
.char-badge{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--dim);border-radius:30px;padding:8px 16px;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.char-badge-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.char-badge-name{font-size:10px;letter-spacing:2px;color:var(--text);text-transform:uppercase;}
.char-badge-sub{font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.start-row{display:flex;gap:12px;align-items:center;}
.controls-hint{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:center;line-height:2.2;}
.controls-hint kbd{color:#888;border:1px solid #333;border-radius:3px;padding:1px 6px;font-size:7px;margin:0 2px;background:#111;font-family:'Space Mono',monospace;}
.controls-hint .dk{color:var(--cyan);border-color:#00cfff33;background:rgba(0,207,255,0.05);}

/* ═══════════════════════════════════════════
   SHOP — Clarity overhaul
═══════════════════════════════════════════ */
#shop-screen{background:#0a0a0f;flex-direction:column;overflow:hidden;padding:0;justify-content:flex-start;}
.shop-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--s3);flex-shrink:0;background:rgba(0,0,0,0.2);}
.shop-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,5vw,38px);color:var(--text);letter-spacing:5px;}
.shop-cur{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--dim);border-radius:20px;padding:6px 14px;box-shadow:0 0 16px rgba(255,204,0,0.1);}
.shop-cur-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);letter-spacing:2px;}
.shop-tabs{display:flex;border-bottom:1px solid var(--s3);width:100%;flex-shrink:0;background:rgba(0,0,0,0.1);}
.shop-tab{flex:1;padding:11px 4px;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:center;cursor:pointer;pointer-events:all;border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s,background 0.2s;}
.shop-tab:hover{color:var(--text);background:rgba(255,255,255,0.03);}
.shop-tab.active{color:var(--primary);border-bottom-color:var(--primary);background:rgba(0,245,160,0.04);}
.shop-body{flex:1;overflow-y:auto;overflow-x:hidden;width:100%;padding:16px;scrollbar-width:thin;scrollbar-color:#333 transparent;}
.shop-body::-webkit-scrollbar{width:3px;}
.shop-body::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:12px;}

/* ═══════════════════════════════════════════
   SHOP ITEM CARDS — much clearer pricing
═══════════════════════════════════════════ */
.si{
  background:var(--s2);border:1px solid var(--s3);border-radius:var(--radius);
  padding:14px 10px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;
  cursor:pointer;pointer-events:all;position:relative;overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s,background 0.2s;
}
.si::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);}
.si:hover{border-color:var(--dim);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.4);background:var(--s3);}
.si.sel{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary), 0 0 20px rgba(0,245,160,0.2);background:rgba(0,245,160,0.04);}
.si.can-afford:not(.sel):not(.locked){border-color:rgba(0,245,160,0.25);}
.si.locked{opacity:0.55;}
.si.locked:hover{transform:none;box-shadow:none;}
.si-name{font-size:10px;letter-spacing:2px;color:var(--text);text-transform:uppercase;text-align:center;font-weight:700;}
.si-sub{font-size:7px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;text-align:center;line-height:1.5;}

/* Price badge — BIG and clear */
.si-price-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:2px;}
.price-tag{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,204,0,0.12);border:1px solid rgba(255,204,0,0.3);
  border-radius:20px;padding:4px 10px;
}
.price-tag .p-num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);letter-spacing:1px;line-height:1;text-shadow:0 0 8px rgba(255,204,0,0.4);}
.price-tag.owned-tag{background:rgba(0,245,160,0.1);border-color:rgba(0,245,160,0.3);}
.price-tag.owned-tag .p-num{color:var(--primary);font-size:12px;letter-spacing:2px;}
.price-tag.sel-tag{background:rgba(0,245,160,0.15);border-color:var(--primary);}
.price-tag.sel-tag .p-num{color:var(--primary);font-size:11px;letter-spacing:2px;}
.price-tag.cant-tag{background:rgba(255,56,100,0.1);border-color:rgba(255,56,100,0.3);}
.price-tag.cant-tag .p-num{color:#ff8888;}
.flux-icon-xs{width:12px;height:12px;flex-shrink:0;}

/* Status badge */
.si-status{font-size:7px;letter-spacing:2px;text-transform:uppercase;}
.si-status.owned{color:var(--primary);}
.si-status.locked-s{color:var(--muted);}
.si-status.selected{color:var(--primary);font-weight:700;}

/* Purchase animation */
@keyframes pf{0%{box-shadow:0 0 0 rgba(0,245,160,0)}40%{box-shadow:0 0 0 4px rgba(0,245,160,0.5),0 0 32px rgba(0,245,160,0.6)}100%{box-shadow:0 0 0 rgba(0,245,160,0)}}
.si.purchased{animation:pf 0.6s ease;}

/* Upgrade Panel */
.upgrade-panel{
  grid-column:1/-1;background:#0d0d1a;border:1px solid var(--dim);border-radius:8px;
  padding:12px 14px;margin-bottom:2px;
}
.upg-title{font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.upg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.upg-bar{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.upg-bar-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}
.upg-level{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;}
.upg-effect{font-size:7px;letter-spacing:1px;color:#889;text-transform:uppercase;line-height:1.6;margin-bottom:8px;}
.upg-price{display:flex;align-items:center;gap:5px;background:rgba(255,204,0,0.1);border:1px solid rgba(255,204,0,0.25);border-radius:20px;padding:4px 10px;width:fit-content;}
.upg-p-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);}
@keyframes upg-glow{0%,100%{box-shadow:0 0 0}50%{box-shadow:0 0 20px rgba(255,204,0,0.6)}}

/* BG preview */
.bg-prev{width:100%;height:46px;border-radius:6px;overflow:hidden;position:relative;flex-shrink:0;}

/* ═══════════════════════════════════════════
   GAME OVER SCREEN
═══════════════════════════════════════════ */
#go-screen{background:rgba(8,8,14,0.95);backdrop-filter:blur(6px);}
#go-screen:not(.hidden) .go-t{animation:go-drop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;}
#go-screen:not(.hidden) .go-s{animation:go-rise 0.4s 0.1s ease both;}
#go-screen:not(.hidden) .go-e{animation:go-rise 0.4s 0.22s ease both;}
#go-screen:not(.hidden) .go-b{animation:go-rise 0.4s 0.34s ease both;}
.go-t{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,11vw,76px);color:var(--accent);letter-spacing:6px;text-shadow:0 0 30px rgba(255,56,100,0.6),0 0 60px rgba(255,56,100,0.2);line-height:1;}
.go-s{display:flex;gap:28px;align-items:flex-end;}
.sb{display:flex;flex-direction:column;align-items:center;gap:4px;}
.sb-l{font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.sb-v{font-family:'Bebas Neue',sans-serif;font-size:46px;color:var(--text);letter-spacing:3px;line-height:1;}
.sb-v.best{color:var(--primary);font-size:34px;text-shadow:0 0 14px rgba(0,245,160,0.4);}
.nr-badge{font-size:9px;letter-spacing:3px;color:var(--primary);text-transform:uppercase;display:none;}
.nr-badge.show{display:block;font-size:11px;letter-spacing:6px;animation:nr-flash 0.6s ease infinite alternate,glow-p 1.2s ease-in-out infinite;}
.go-e{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid rgba(255,204,0,0.2);border-radius:30px;padding:10px 22px;box-shadow:0 0 20px rgba(255,204,0,0.06);}
.go-e-l{font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.go-e-v{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:2px;text-shadow:0 0 12px rgba(255,204,0,0.5);}
.go-b{display:flex;gap:12px;}

/* ═══════════════════════════════════════════
   IN-GAME HUD — Refined
═══════════════════════════════════════════ */
#score-hud{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:1px;opacity:0;transition:opacity 0.3s;}
#score-hud.vis{opacity:1;}
#score-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(34px,8vw,54px);color:var(--primary);line-height:1;text-shadow:0 0 20px rgba(0,245,160,0.5);letter-spacing:4px;}
#score-val.pop{animation:sc-pop 0.2s ease-out;}
#score-lbl{font-size:8px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}

#flux-hud{position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:5px;opacity:0;transition:opacity 0.3s;background:rgba(0,0,0,0.35);border:1px solid rgba(255,204,0,0.15);border-radius:20px;padding:4px 10px;}
#flux-hud.vis{opacity:1;}
#flux-hud-v{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gold);letter-spacing:2px;}

#combo-hud{position:absolute;bottom:48px;left:50%;transform:translateX(-50%) scale(0.8);display:flex;flex-direction:column;align-items:center;gap:1px;opacity:0;transition:opacity 0.25s,transform 0.25s;}
#combo-hud.vis{opacity:1;transform:translateX(-50%) scale(1);}
#combo-v{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,5vw,30px);color:var(--gold);line-height:1;letter-spacing:3px;text-shadow:0 0 16px rgba(255,204,0,0.7);}
#combo-l{font-size:7px;color:#ffcc0088;letter-spacing:3px;text-transform:uppercase;}

/* ── ABILITY HUD — bigger, clearer ── */
#abil-hud{
  position:absolute;top:12px;left:12px;
  display:flex;flex-direction:column;align-items:flex-start;gap:4px;
  opacity:0;transition:opacity 0.3s;min-width:70px;
}
#abil-hud.vis{opacity:1;}
#abil-name-row{display:flex;align-items:center;gap:5px;}
#abil-icon-el{font-size:14px;line-height:1;}
#abil-lbl{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
/* Cooldown bar — taller + duration timer */
#abil-cd-wrap{width:68px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);}
#abil-bar{height:100%;width:100%;border-radius:3px;transition:width 0.12s linear;}
/* Duration bar (shows active time remaining) */
#abil-dur-wrap{width:68px;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;display:none;}
#abil-dur-bar{height:100%;width:100%;border-radius:2px;opacity:0.7;animation:dur-pulse 0.8s ease-in-out infinite alternate;}
@keyframes dur-pulse{0%{opacity:0.5}100%{opacity:1}}
#abil-status{font-size:8px;letter-spacing:2px;text-transform:uppercase;transition:opacity 0.2s;font-weight:700;}
#abil-status.ready{color:var(--primary);text-shadow:0 0 8px rgba(0,245,160,0.5);}
#abil-status.active{color:var(--gold);text-shadow:0 0 8px rgba(255,204,0,0.6);}
#abil-status.cooling{color:var(--muted);}
#abil-key-hint{font-size:7px;letter-spacing:1px;color:#445;text-transform:uppercase;}

/* Mobile ability button — improved */
#mob-abil-btn{
  position:absolute;bottom:20px;right:14px;
  width:58px;height:58px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  cursor:pointer;pointer-events:all;opacity:0;transition:opacity 0.3s,transform 0.1s,box-shadow 0.2s;
  font-family:'Space Mono',monospace;font-weight:700;
  border:2px solid var(--cyan);
  background:rgba(0,0,0,0.7);
  box-shadow:0 0 16px rgba(0,207,255,0.2);
}
#mob-abil-btn.vis{opacity:1;}
#mob-abil-btn:active{transform:scale(0.88);}
#mob-abil-btn.rdy{box-shadow:0 0 24px rgba(0,207,255,0.5);animation:mob-pulse 1.4s ease-in-out infinite;}
@keyframes mob-pulse{0%,100%{box-shadow:0 0 16px rgba(0,207,255,0.3)}50%{box-shadow:0 0 28px rgba(0,207,255,0.7)}}
#mob-abil-icon{font-size:20px;line-height:1;}
#mob-abil-cd{font-size:7px;letter-spacing:1px;color:var(--muted);}

/* Active ability overlay — color-coded border glow */
#abil-active-ring{position:absolute;inset:2px;border-radius:0;pointer-events:none;border:3px solid transparent;opacity:0;transition:opacity 0.3s;box-shadow:none;}
#abil-active-ring.show{opacity:1;}

#jump-dots{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;opacity:0;transition:opacity 0.3s;}
#jump-dots.vis{opacity:1;}
.jdot{width:8px;height:8px;border-radius:50%;background:var(--primary);box-shadow:0 0 8px rgba(0,245,160,0.6);transition:background 0.15s,box-shadow 0.15s,transform 0.1s;}
.jdot.used{background:rgba(255,255,255,0.1);box-shadow:none;}
.jdot.pulse{animation:dot-p 0.2s ease;}

#spd-bar-w{position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity 0.3s;}
#spd-bar-w.vis{opacity:1;}
#spd-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));width:0%;transition:width 0.5s ease;box-shadow:0 0 6px rgba(0,245,160,0.4);}

#milestone-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.4);font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,7vw,50px);letter-spacing:6px;color:#fff;text-shadow:0 0 28px rgba(255,204,0,0.9),0 0 60px rgba(255,204,0,0.4);pointer-events:none;opacity:0;white-space:nowrap;}
#milestone-banner.show{animation:mb-in 1.6s ease forwards;}

/* Visual overlays */
#abil-flash{position:absolute;inset:0;pointer-events:none;opacity:0;}
#slowmo-vignette{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 0.4s;border-radius:0;}

/* ── Keyframes ── */
@keyframes pulse-up{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(-8px);opacity:0.7}}
@keyframes glow-p{0%,100%{text-shadow:0 0 12px rgba(0,245,160,0.4)}50%{text-shadow:0 0 28px rgba(0,245,160,0.85),0 0 50px rgba(0,245,160,0.4)}}
@keyframes sc-pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes dot-p{0%{transform:scale(1)}50%{transform:scale(1.8)}100%{transform:scale(1)}}
@keyframes go-drop{from{opacity:0;transform:translateY(-30px) scale(1.12)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes go-rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes nr-flash{from{letter-spacing:4px}to{letter-spacing:9px}}
@keyframes mb-in{0%{opacity:0;transform:translate(-50%,-50%) scale(0.35)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}26%{transform:translate(-50%,-50%) scale(1)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(0.88) translateY(-24px)}}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="game"></canvas>
  <div id="ui">
    <!-- In-game HUD -->
    <div id="score-hud"><div id="score-val">0</div><div id="score-lbl">Score</div></div>
    <div id="flux-hud">

  canvas.width=W;canvas.height=H;
  canvas.style.width=cw+'px';canvas.style.height=ch+'px';

}

//  AUDIO ENGINE
// ══════════════════════════════════════════════════════════
const ACtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function initAudio(){if(audioCtx)return;try{audioCtx=new ACtx();}catch(e){}}
function tone(freq,type,dur,vol,fe){
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    if(fe!=null)o.frequency.exponentialRampToValueAtTime(fe,audioCtx.currentTime+dur);
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function getUpgLevel(id){return SD.upgrades[id]||0;}
function getAbilCD(id){
  const ch=CHARS[id],lv=getUpgLevel(id);let cd=ch.baseCD;
  ch.upgrades.forEach((u,i)=>{if(lv>i+1)cd-=u.cdBonus;});
  return Math.max(20,cd);
}
function getAbilDur(id){
  const ch=CHARS[id],lv=getUpgLevel(id);
  let dur=ch.baseDur;
  const dm=getUpgStat(id,'glideDurMult')||getUpgStat(id,'slowDur')||getUpgStat(id,'phaseDur')||getUpgStat(id,'stormDur')||getUpgStat(id,'shrinkDur')||1;
  if(typeof dm==='number'&&dm!==1) dur=Math.round(dur*dm);
  return dur;
}
function getUpgStat(id,stat){
  const ch=CHARS[id],lv=getUpgLevel(id);
  for(let i=0;i<lv-1&&i<ch.upgrades.length;i++){
    const s=ch.upgrades[i].statBonus;
    if(s.startsWith(stat+':'))return parseFloat(s.split(':')[1]);
  }
  return null;
}

  for(let i=0;i<20;i++) bgStars.push({x:Math.random()*W,y:Math.random()*(GROUND_Y-40),r:Math.random()*1.6+0.5,speed:0.2,alpha:Math.random()*0.28+0.1,layer:1});
  if(bg==='city'){for(let i=0;i<18;i++){const h=randInt(40,120),l={type:'building',x:randInt(0,W*2),w:randInt(18,45),h,speed:0.12,lights:[]};bgLayers.push(l);for(let y=GROUND_Y-h+6;y<GROUND_Y-8;y+=10)for(let x=l.x+4;x<l.x+l.w-4;x+=8)if(Math.random()>0.4)l.lights.push({x,y,on:Math.random()>0.3});}}
  else if(bg==='mountain'){for(let i=0;i<3;i++){const pts=[],n=randInt(4,7);for(let j=0;j<=n;j++)pts.push({x:(W/n)*j,y:randInt(60,150)});bgLayers.push({type:'mountain',pts,speed:0.04*(i+1),color:`rgba(${15+i*8},${15+i*10},${25+i*12},${0.9-i*0.2})`,offset:0});}}
  else if(bg==='space'){for(let i=0;i<8;i++)bgLayers.push({type:'nebula',x:Math.random()*W,y:Math.random()*(GROUND_Y*0.8),r:randInt(30,80),hue:randInt(200,320),alpha:Math.random()*0.12+0.04,speed:0.03+Math.random()*0.06});for(let i=0;i<30;i++)bgStars.push({x:Math.random()*W,y:Math.random()*(GROUND_Y-40),r:Math.random()*2+0.5,speed:0.04,alpha:Math.random()*0.6+0.2,layer:0,twinkle:Math.random()*Math.PI*2});}
  else if(bg==='sunset'){for(let i=0;i<6;i++)bgLayers.push({type:'cloud',x:Math.random()*W*1.5,y:randInt(20,90),w:randInt(60,130),h:randInt(18,36),speed:0.08+Math.random()*0.1});}
  else if(bg==='ocean'){for(let i=0;i<4;i++)bgLayers.push({type:'wave',x:i*(W/4),h:randInt(10,30),speed:0.15+i*0.05,offset:0});for(let i=0;i<12;i++)bgLayers.push({type:'bubble',x:Math.random()*W,y:Math.random()*(GROUND_Y-20),r:randInt(2,8),speed:0.05+Math.random()*0.1,alpha:Math.random()*0.3+0.1});}
  else if(bg==='forest'){for(let i=0;i<12;i++)bgLayers.push({type:'tree',x:randInt(0,W*2),h:randInt(60,140),w:randInt(20,40),speed:0.1+i*0.005,glow:i%3===0});for(let i=0;i<15;i++)bgLayers.push({type:'firefly',x:Math.random()*W,y:randInt(20,GROUND_Y-40),r:2,alpha:Math.random(),phase:Math.random()*Math.PI*2,speed:0.02+Math.random()*0.05});}
  else if(bg==='desert'){for(let i=0;i<3;i++){const pts=[],n=5;for(let j=0;j<=n;j++)pts.push({x:(W/n)*j,y:GROUND_Y-30-randInt(0,40)+Math.sin(j)*20});bgLayers.push({type:'dune',pts,speed:0.03*(i+1),color:`rgba(${60+i*15},${30+i*10},0,${0.7-i*0.15})`,offset:0});}bgLayers.push({type:'sandstorm',x:0,alpha:0.04});}
  else if(bg==='arctic2'){for(let i=0;i<3;i++){const pts=[],n=randInt(4,6);for(let j=0;j<=n;j++)pts.push({x:(W/n)*j,y:randInt(40,120)});bgLayers.push({type:'iceberg',pts,speed:0.03*(i+1),color:`rgba(${100+i*20},${150+i*20},${200+i*15},${0.5-i*0.1})`,offset:0});}for(let i=0;i<20;i++)bgStars.push({x:Math.random()*W,y:Math.random()*(GROUND_Y-40),r:Math.random()*1.8+0.4,speed:0.03,alpha:Math.random()*0.5+0.15,layer:0,twinkle:Math.random()*Math.PI*2});}
  else if(bg==='volcano'){for(let i=0;i<5;i++)bgLayers.push({type:'ember',x:Math.random()*W,y:GROUND_Y-randInt(10,120),vx:(Math.random()-0.5)*0.5,vy:-Math.random()*0.5-0.2,alpha:Math.random()*0.6+0.2,r:randInt(1,4)});for(let i=0;i<3;i++)bgLayers.push({type:'lava_pool',x:randInt(0,W),w:randInt(30,80),speed:0.06+i*0.03});}
}

function updateBackground(dt){
  for(const s of bgStars){s.x-=s.speed*gameSpeed*(s.layer===0?0.07:0.22)*dt;if(s.x<-4)s.x=W+4;if(s.twinkle!=null)s.twinkle+=0.05*dt;}
  for(const l of bgLayers){
    if(l.type==='building'){l.x-=l.speed*gameSpeed*dt;if(l.x+l.w<0){l.x=W+randInt(0,60);l.h=randInt(40,120);}if(Math.random()<0.001)l.lights.forEach(lt=>{if(Math.random()<0.15)lt.on=!lt.on;});}
    else if(l.type==='mountain'||l.type==='dune'||l.type==='iceberg'){l.offset-=l.speed*gameSpeed*dt;}
    else if(l.type==='nebula'){l.x-=l.speed*gameSpeed*dt;if(l.x+l.r<0)l.x=W+l.r;}
    else if(l.type==='cloud'){l.x-=l.speed*gameSpeed*dt;if(l.x+l.w<0)l.x=W+randInt(0,80);}
    else if(l.type==='wave'){l.offset+=l.speed*dt;}
    else if(l.type==='bubble'){l.y-=l.speed*dt;if(l.y<0)l.y=GROUND_Y;}
    else if(l.type==='tree'){l.x-=l.speed*gameSpeed*dt;if(l.x+l.w<0)l.x=W+randInt(0,60);}
    else if(l.type==='firefly'){l.x-=0.02*gameSpeed*dt;if(l.x<0)l.x=W;l.phase+=0.05*dt;l.alpha=0.4+0.6*Math.sin(l.phase);}
    else if(l.type==='ember'){l.x+=l.vx*dt;l.y+=l.vy*dt;l.alpha-=0.003*dt;if(l.y<0||l.alpha<=0){l.x=Math.random()*W;l.y=GROUND_Y-randInt(10,80);l.alpha=Math.random()*0.6+0.2;}}
    else if(l.type==='lava_pool'){l.x-=l.speed*gameSpeed*dt;if(l.x+l.w<0)l.x=W+randInt(0,80);}
  }
}

function drawBackground(){
  const bg=SD.selBg;
  const fills={void:Math.abs(bgHue)>0.5?`hsl(${bgHue+155},28%,4%)`:COL.bg,city:'#020510',mountain:'#0a0515',space:'#010108',sunset:'#1a0a05',ocean:'#020810',forest:'#050a02',desert:'#1a0e00',arctic2:'#050a14',volcano:'#180000'};
  if(bg==='sunset'){const g=ctx.createLinearGradient(0,0,0,GROUND_Y);g.addColorStop(0,'#1a0a05');g.addColorStop(0.4,'#2d1208');g.addColorStop(1,'#0d0505');ctx.fillStyle=g;}
  else if(bg==='ocean'){const g=ctx.createLinearGradient(0,0,0,GROUND_Y);g.addColorStop(0,'#020810');g.addColorStop(1,'#001428');ctx.fillStyle=g;}
  else if(bg==='forest'){const g=ctx.createLinearGradient(0,0,0,GROUND_Y);g.addColorStop(0,'#020802');g.addColorStop(1,'#050a02');ctx.fillStyle=g;}
  else if(bg==='desert'){const g=ctx.createLinearGradient(0,0,0,GROUND_Y);g.addColorStop(0,'#1a0e00');g.addColorStop(1,'#0a0700');ctx.fillStyle=g;}
  else if(bg==='arctic2'){const g=ctx.createLinearGradient(0,0,0,GROUND_Y);g.addColorStop(0,'#050a14');g.addColorStop(1,'#020508');ctx.fillStyle=g;}
  else if(bg==='volcano'){const g=ctx.createLinearGradient(0,0,0,GROUND_Y);g.addColorStop(0,'#180000');g.addColorStop(1,'#050000');ctx.fillStyle=g;}
  else ctx.fillStyle=fills[bg]||COL.bg;
  ctx.fillRect(0,0,W,H);

  for(const l of bgLayers){
    const drawMountainLike=(col,off)=>{ctx.fillStyle=col;for(let rep=0;rep<2;rep++){ctx.beginPath();ctx.moveTo(-10+off%W-rep*W,GROUND_Y);l.pts.forEach(p=>ctx.lineTo(p.x+off%W-rep*W,p.y));ctx.lineTo(W+10,GROUND_Y);ctx.closePath();ctx.fill();}};
    if(l.type==='building'){const bx=l.x,by=GROUND_Y-l.h;ctx.fillStyle='#0a0a18';ctx.fillRect(bx,by,l.w,l.h);l.lights.forEach(lt=>{ctx.fillStyle=lt.on?'rgba(255,220,80,0.7)':'rgba(30,30,50,0.5)';ctx.fillRect(lt.x,lt.y,4,5);});ctx.strokeStyle='rgba(0,80,255,0.18)';ctx.lineWidth=1;ctx.strokeRect(bx,by,l.w,l.h);}
    else if(l.type==='mountain')drawMountainLike(l.color,l.offset);
    else if(l.type==='dune')drawMountainLike(l.color,l.offset);
    else if(l.type==='iceberg')drawMountainLike(l.color,l.offset);
    else if(l.type==='nebula'){ctx.globalAlpha=l.alpha;const g=ctx.createRadialGradient(l.x,l.y,0,l.x,l.y,l.r);g.addColorStop(0,`hsl(${l.hue},80%,60%)`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(l.x,l.y,l.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    else if(l.type==='cloud'){ctx.globalAlpha=0.22;ctx.fillStyle=bg==='sunset'?'#ff8855':'#8899bb';ctx.beginPath();ctx.ellipse(l.x+l.w/2,l.y+l.h/2,l.w/2,l.h/2,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    else if(l.type==='wave'){ctx.strokeStyle='rgba(0,150,255,0.14)';ctx.lineWidth=2;ctx.beginPath();for(let x=0;x<=W;x+=4){const y=GROUND_Y-l.h+Math.sin((x+l.offset*60)*0.05)*8;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();}
    else if(l.type==='bubble'){ctx.globalAlpha=l.alpha;ctx.fillStyle='rgba(100,180,255,0.4)';ctx.beginPath();ctx.arc(l.x,l.y,l.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    else if(l.type==='tree'){const tx=l.x,ty=GROUND_Y-l.h;ctx.fillStyle=l.glow?'#0a1a05':'#060d03';ctx.fillRect(tx,ty,l.w,l.h);if(l.glow){ctx.shadowColor='#00ff44';ctx.shadowBlur=8;ctx.strokeStyle='rgba(0,255,68,0.25)';ctx.lineWidth=1;ctx.strokeRect(tx,ty,l.w,l.h);ctx.shadowBlur=0;}}
    else if(l.type==='firefly'){ctx.globalAlpha=l.alpha;ctx.fillStyle='#aaff44';ctx.beginPath();ctx.arc(l.x,l.y,l.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    else if(l.type==='sandstorm'){ctx.globalAlpha=0.04;ctx.fillStyle='#ff9922';ctx.fillRect(0,0,W,GROUND_Y);ctx.globalAlpha=1;}
    else if(l.type==='ember'){ctx.globalAlpha=l.alpha;ctx.fillStyle='#ff5500';ctx.beginPath();ctx.arc(l.x,l.y,l.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    else if(l.type==='lava_pool'){ctx.globalAlpha=0.3;const g=ctx.createLinearGradient(l.x,GROUND_Y-8,l.x,GROUND_Y);g.addColorStop(0,'#ff4400');g.addColorStop(1,'#880000');ctx.fillStyle=g;ctx.fillRect(l.x,GROUND_Y-8,l.w,8);ctx.globalAlpha=1;}
  }
  for(const s of bgStars){const a=s.twinkle!=null?s.alpha*(0.6+0.4*Math.sin(s.twinkle)):s.alpha;ctx.globalAlpha=a;ctx.fillStyle=bg==='space'?`hsl(${(s.x*1.5)%360},60%,90%)`:bg==='forest'?'#88ff44':bg==='arctic2'?'#ccddff':'#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  if(bg==='sunset'){const g=ctx.createLinearGradient(0,GROUND_Y-60,0,GROUND_Y);g.addColorStop(0,'rgba(255,80,0,0.22)');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,GROUND_Y-60,W,60);}
  if(bg==='mountain'){const g=ctx.createLinearGradient(0,GROUND_Y-80,0,GROUND_Y);g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(20,10,30,0.55)');ctx.fillStyle=g;ctx.fillRect(0,GROUND_Y-80,W,80);}
  if(bg==='ocean'){const g=ctx.createLinearGradient(0,GROUND_Y-40,0,GROUND_Y);g.addColorStop(0,'rgba(0,80,180,0.28)');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,GROUND_Y-40,W,40);}
  if(bg==='arctic2'){const g=ctx.createLinearGradient(0,GROUND_Y-50,0,GROUND_Y);g.addColorStop(0,'rgba(80,140,220,0.18)');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,GROUND_Y-50,W,50);}

// ══════════════════════════════════════════════════════════
function spawnObstacle(atX){
  const tier=Math.min(Math.floor(elapsed/5.5),6);
  const pool=['spike','wall'];
  if(tier>=1)pool.push('spike');if(tier>=2)pool.push('spike_pair');if(tier>=3)pool.push('wall_tall');
  if(tier>=4)pool.push('spike_pair','wall_tall');if(tier>=5)pool.push('gauntlet');if(tier>=6)pool.push('gauntlet','spike_trio');
  const t=pool[randInt(0,pool.length-1)];
  const plat=platforms.find(p=>p.x<atX&&p.x+p.w>atX);
  const oy=plat?plat.y:GROUND_Y;
  const mk=(type,x,y,w,h)=>({type,x,y,w,h,nearMissed:false,phased:false,stormFrozen:false});
  if(t==='spike')obstacles.push(mk('spike',atX,oy-22,24,22));
  else if(t==='spike_pair'){obstacles.push(mk('spike',atX,oy-22,24,22));obstacles.push(mk('spike',atX+44,oy-22,24,22));}
  else if(t==='spike_trio'){[0,38,76].forEach(dx=>obstacles.push(mk('spike',atX+dx,oy-22,24,22)));}
  else if(t==='wall'){const h=randInt(40,70);obstacles.push(mk('wall',atX,oy-h,18,h));}
  else if(t==='wall_tall'){const h=randInt(75,108);obstacles.push(mk('wall',atX,oy-h,18,h));}
  else if(t==='gauntlet'){obstacles.push(mk('spike',atX,oy-22,24,22));const h=randInt(50,82);obstacles.push(mk('wall',atX+72,oy-h,18,h));}
}

function activateAbility(){
  if(SD.selChar==='phoenix'){floatText('REBIRTH READY!',player.x+PLAYER_W/2,player.y-20,CHARS.phoenix.glow,14);return;}
  if(abilCooldown>0)return;
  const ch=CHARS[SD.selChar];
  abilMaxDur=getAbilDur(SD.selChar);
  abilTimer=abilMaxDur;
  abilCooldown=getAbilCD(SD.selChar);
  abilActive=true;
  sfxAbility();
  // Flash overlay with character color
  abilFlash.style.background=`radial-gradient(ellipse at 50% 80%,${ch.color}55,transparent)`;
  abilFlash.style.opacity='1';
  setTimeout(()=>abilFlash.style.opacity='0',300);
  // Active ring
  abilActiveRing.style.boxShadow=`inset 0 0 0 3px ${ch.color}88, inset 0 0 20px ${ch.color}33`;
  abilActiveRing.classList.add('show');
  abilDurWrap.style.display='block';
  abilDurBar.style.background=ch.color;
  mobAbilBtn.classList.remove('rdy');

  switch(SD.selChar){
    case 'runner':    doBoost(ch); break;
    case 'glider':    doGlide(ch); break;
    case 'dasher':    doDash(ch); break;
    case 'ghost':     doPhase(ch); break;
    case 'magnet':    doMagnet(ch); break;
    case 'timebender':doSlowMo(ch); break;
    case 'jumper':    doJump(ch); break;
    case 'tank':      doShield(ch); break;
    case 'ninja':     doTeleport(ch); break;
    case 'storm':     doStorm(ch); break;
    case 'specter':   doShrink(ch); break;
    case 'mech':      doStomp(ch); break;
    case 'bubble':    doBubble(ch); break;
  }
}
function endAbility(){
  abilActive=false;
  abilActiveRing.classList.remove('show');
  abilDurWrap.style.display='none';
  player.glideActive=false;fluxMult=1;stormActive=false;
  specterShrunk=false;mechStomp=false;
  if(SD.selChar==='timebender'){slowMoActive=false;slowMoMult=1;slowmoVignette.style.opacity='0';}
}

function doBoost(ch){
  const m=getUpgStat('runner','boostMult')||1.2;
  gameSpeed=Math.min(gameSpeed*(m+(m-1)*0.5),MAX_SPEED+2);// ramp up nicely
  floatText('BOOST!',player.x+PLAYER_W/2,player.y-22,ch.color,18);
  for(let i=0;i<18;i++){const a=Math.PI+(Math.random()-0.5)*0.6,sp=Math.random()*4+3;addP(player.x+PLAYER_W/2,player.y+PLAYER_H/2,Math.cos(a)*sp,Math.sin(a)*sp,Math.random()*6+2,ch.color,0.035);}
}
function doGlide(ch){
  player.glideActive=true;

}
function doDash(ch){
  const dc=getUpgStat('dasher','dashCount')||3;
  player.dashCount=dc;player.dashMax=dc;

}
function triggerOneDash(ch){
  if(player.dashCount<=0)return;

  player.dashInvul=getUpgStat('dasher','dashDur')!=null;
  if(!player.onGround)player.vy=Math.min(player.vy,-1.5);

}
function doMagnet(ch){

}
function doSlowMo(ch){

function doTeleport(ch){

function doStorm(ch){
  stormActive=true;
  obstacles.forEach(o=>o.stormFrozen=true);
  floatText('⛈ THUNDER!',player.x+PLAYER_W/2,player.y-22,ch.color,16);

function doShrink(ch){

  floatText('SHRINK!',player.x+PLAYER_W/2,player.y-22,ch.color,18);
  for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*3+1;addP(player.x+PLAYER_W/2,player.y+PLAYER_H/2,Math.cos(a)*sp,Math.sin(a)*sp,Math.random()*4+1,ch.color,0.05);}
}
function doStomp(ch){
  mechStomp=true;
  player.vy=8;// push down hard
  const rad=(getUpgStat('mech','stompRadius')||1)*80;
  const bonus=getUpgStat('mech','stompBonus')||30;
  let cleared=0;
  obstacles=obstacles.filter(o=>{
    const dist=Math.hypot((o.x+o.w/2)-(player.x+PLAYER_W/2),(o.y+o.h/2)-(player.y+PLAYER_H/2));
    if(dist<rad){cleared++;return false;}return true;
  });
  if(cleared>0){score+=cleared*bonus;floatText(`STOMP! +${cleared*bonus}`,player.x+PLAYER_W/2,player.y-22,ch.color,16);}

let lastTapTime=0;
function handleTap(){
  initAudio();
  if(state==='start')return;if(state==='dead')return;
  const now=performance.now();
  if(now-lastTapTime<260){activateAbility();lastTapTime=0;}
  else{lastTapTime=now;attemptJump();}
}
function handleJump(){initAudio();if(state!=='play'||player.dead)return;attemptJump();}
function handleAbil(){initAudio();if(state!=='play'||player.dead)return;activateAbility();}
function attemptJump(){
  if(player.jumpsLeft<=0&&!player.onGround&&player.coyoteTimer<=0){player.jumpBuffer=JUMP_BUFFER;return;}
  executeJump();
}
function executeJump(){
  if(player.jumpsLeft<=0&&player.coyoteTimer<=0)return;
  const ch=CHARS[SD.selChar];
  const jb=getUpgStat(SD.selChar,'jumpBonus')||1;
  player.vy=ch.jumpVel*(typeof jb==='number'?jb:1);
  player.jumpsLeft=Math.max(0,player.jumpsLeft-1);
  player.onGround=false;player.coyoteTimer=0;
  spawnJumpParts();player.squash=0.55;player.squashV=0.1;
  updateJumpDots();sfxJump();checkPerfectJump();
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();handleJump();}
  if(e.code==='KeyA'||e.code==='ShiftLeft'||e.code==='ShiftRight'){e.preventDefault();handleAbil();}
});
canvas.addEventListener('pointerdown',e=>{e.preventDefault();handleTap();});
document.addEventListener('pointerdown',e=>{if(e.target!==canvas)handleTap();});

function setupAbilHUD(){
  const ch=CHARS[SD.selChar];
  abilIconEl.textContent=ABIL_ICONS[SD.selChar]||'⚡';
  abilLbl.textContent=ch.ability;
  abilBar.style.background=ch.glow;

  mobAbilBtn.style.boxShadow=`0 0 16px ${ch.glow}55`;
  mobAbilIcon.textContent=ABIL_ICONS[SD.selChar]||'⚡';
  mobAbilCd.textContent='READY';
  mobAbilBtn.classList.add('rdy');
}
function updateAbilHUD(dt){
  const cd=getAbilCD(SD.selChar);
  // Duration bar (while active)
  if(abilActive&&abilTimer>0){
    const pct=Math.max(0,(abilTimer/abilMaxDur))*100;
    abilDurBar.style.width=pct+'%';
    abilStatus.className='active';
    const sec=Math.ceil(abilTimer/60);
    abilStatus.textContent=`⚡ ${sec}s`;
  } else if(abilCooldown>0){
    abilCooldown-=dt;
    const pct=Math.max(0,(1-abilCooldown/cd))*100;
    abilBar.style.width=pct+'%';
    abilStatus.className='cooling';
    const sec=Math.ceil(abilCooldown/60);
    abilStatus.textContent=`${sec}s`;
    mobAbilCd.textContent=sec+'s';
    if(abilCooldown<=0){
      abilStatus.className='ready';abilStatus.textContent='▶ READY';
      mobAbilCd.textContent='READY';mobAbilBtn.classList.add('rdy');
    }
  } else {
    abilBar.style.width='100%';
    if(!abilActive){abilStatus.className='ready';abilStatus.textContent='▶ READY';mobAbilBtn.classList.add('rdy');}
  }
}

  return`<div class="price-tag cant-tag"><span>${FSvg}</span><span class="p-num">${price}</span></div>`;

function statusBadgeHtml(owned,selected){
  if(selected) return`<div class="si-status selected">✦ Selected</div>`;

          </div>

      }

    }
  });

}

function upgradeChar(id,cost,el){
  initAudio();

}

function drawCharPrev(ch,cnv){
  if(!cnv)return;const c=cnv.getContext('2d');
  const cx=27,cy=36,sw=28,sh=34;c.clearRect(0,0,54,64);
  c.shadowColor=ch.color;c.shadowBlur=12;c.fillStyle=ch.color;
  if(ch.shape==='diamond'){c.beginPath();c.moveTo(cx,cy-sh/2);c.lineTo(cx+sw/2,cy);c.lineTo(cx,cy+sh/2);c.lineTo(cx-sw/2,cy);c.closePath();c.fill();}
  else if(ch.shape==='arrow'){c.beginPath();c.moveTo(cx+sw/2,cy);c.lineTo(cx-sw/4,cy-sh/2);c.lineTo(cx-sw/4,cy-sh/4);c.lineTo(cx-sw/2,cy-sh/4);c.lineTo(cx-sw/2,cy+sh/4);c.lineTo(cx-sw/4,cy+sh/4);c.lineTo(cx-sw/4,cy+sh/2);c.closePath();c.fill();}
  else if(ch.shape==='round'){c.beginPath();c.arc(cx,cy,sw/2,0,Math.PI*2);c.fill();}
  else if(ch.shape==='star'){c.beginPath();for(let i=0;i<5;i++){const a=Math.PI/2+i*(Math.PI*2/5),ai=a+Math.PI/5;c.lineTo(cx+Math.cos(a)*sw/2,cy-Math.sin(a)*sh/2);c.lineTo(cx+Math.cos(ai)*sw/4,cy-Math.sin(ai)*sh/4);}c.closePath();c.fill();}
  else if(ch.shape==='wide'){c.fillRect(cx-sw/2-4,cy-sh/2+4,sw+8,sh-8);}
  else if(ch.shape==='slim'){c.fillRect(cx-sw/2+5,cy-sh/2,sw-10,sh);}
  else if(ch.shape==='flame'){c.beginPath();c.moveTo(cx,cy-sh/2);c.bezierCurveTo(cx+sw/2,cy-sh/4,cx+sw/2,cy,cx,cy+sh/2);c.bezierCurveTo(cx-sw/2,cy,cx-sw/2,cy-sh/4,cx,cy-sh/2);c.fill();}
  else if(ch.shape==='bouncy'){roundRect(c,cx-sw/2,cy-sh/2,sw,sh,10);c.fill();}
  else{roundRect(c,cx-sw/2,cy-sh/2,sw,sh,6);c.fill();}
  c.shadowBlur=0;
  if(ch.shape!=='star'&&ch.shape!=='flame'){
    c.fillStyle=ch.eyeColor||'#0a0a0f';c.beginPath();c.arc(cx+6,cy-6,3,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(255,255,255,0.5)';c.beginPath();c.arc(cx+7.5,cy-7.5,1.2,0,Math.PI*2);c.fill();
  }
}

function shopClick(type,id,price,el){
  initAudio();

  else if(type==='skin'){arr=SD.skins;key='selSkin';}

}

// ══════════════════════════════════════════════════════════
const COMBO_T=200;
function addCombo(){combo++;comboTimer=COMBO_T;updateComboHUD();if(combo>=2)sfxCombo();}
function resetCombo(){combo=0;comboTimer=0;comboHud.classList.remove('vis');}
function updateComboHUD(){if(combo>=2){comboV.textContent=`x${combo}`;comboHud.classList.add('vis');}else comboHud.classList.remove('vis');}
function cMult(){return combo>=10?3:combo>=5?2:combo>=2?1.5:1;}

function checkNearMisses(){
  const pcx=player.x+PLAYER_W/2,pcy=player.y+PLAYER_H/2;
  for(const o of obstacles){
    if(o.nearMissed)continue;
    const r=getOR(o);
    if(o.x+o.w>=player.x-10&&o.x+o.w<=player.x+10){
      if(Math.hypot(pcx-(r.x+r.w/2),pcy-(r.y+r.h/2))<NEAR_MISS_R){
        o.nearMissed=true;const b=Math.round(25*cMult());score+=b;earnFlux(Math.round(b/8));
        addCombo();floatText('CLOSE!',pcx,player.y-10,'#ff3864',16);floatText(`+${b}`,pcx,player.y-30,'#ffcc00',13);
        sfxNearMiss();bgHueTarget=15;setTimeout(()=>{bgHueTarget=0;},320);
      }
    }
  }
}
function checkPerfectJump(){
  for(const p of platforms){
    if(player.y+PLAYER_H<p.y-4)continue;
    const dL=Math.abs(player.x-p.x),dR=Math.abs((player.x+PLAYER_W)-(p.x+p.w));
    if(Math.min(dL,dR)<PERFECT_PX){
      const b=Math.round(15*cMult());score+=b;addCombo();
      floatText('PERFECT!',player.x+PLAYER_W/2,player.y-28,'#00f5a0',17);
      floatText(`+${b}`,player.x+PLAYER_W/2,player.y-46,'#ffcc00',12);
      sfxPerfect();for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*4+2;addP(player.x+PLAYER_W/2,player.y+PLAYER_H,Math.cos(a)*sp,Math.sin(a)*sp-2,Math.random()*5+2,'#00f5a0',0.030);}
      earnFlux(4);return;
    }
  }
}

function getPC(){
  const sk=SD.selSkin,ch=CHARS[SD.selChar];
  if(sk==='rainbow')return`hsl(${rainbowHue%360},100%,65%)`;
  if(sk==='void')return'#6644aa';
  if(sk==='fire')return player.dashing?'#ff9900':'#ff6b35';
  if(sk==='gold')return'#ffcc00';
  if(sk==='plasma')return'#00ffee';
  if(sk==='lava')return'#ff2200';
  if(sk==='crystal')return'#aaddff';
  if(sk==='ice')return'#88ddff';
  if(sk==='shadow')return'#222244';
  if(sk==='hologram')return`hsl(${(rainbowHue*0.3+160)%360},80%,70%)`;
  if(sk==='obsidian')return'#220033';
  if(sk==='volt')return'#ffff00';
  if(sk==='cosmic')return`hsl(${(rainbowHue*0.5+260)%360},75%,65%)`;
  if(sk==='ember')return`hsl(${25+Math.sin(rainbowHue/8)*10},100%,60%)`;
  if(sk==='arctic')return`hsl(${200+Math.sin(rainbowHue/10)*10},80%,85%)`;
  return player.dashing?'#00cfff':ch.color;
}

function floatText(txt,x,y,col,sz){floatTexts.push({text:txt,x,y,col,size:sz||14,life:1});}
function updateJumpDots(){
  jdot1.classList.toggle('used',player.jumpsLeft<1);
  jdot2.classList.toggle('used',player.jumpsLeft<2);
  const d=player.jumpsLeft===1?jdot2:jdot1;d.classList.remove('pulse');void d.offsetWidth;d.classList.add('pulse');

function rectOvlp(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function getOR(o){return o.type==='spike'?{x:o.x+4,y:o.y+4,w:o.w-8,h:o.h-4}:{x:o.x,y:o.y,w:o.w,h:o.h};}

// ══════════════════════════════════════════════════════════
//  MAIN UPDATE LOOP
// ══════════════════════════════════════════════════════════
let lastTime=0;
function update(ts){
  if(!lastTime)lastTime=ts;
  let dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;
  if(state!=='play')return;

  const spdMult=slowMoActive?slowMoMult:1;
  dt*=spdMult;

  elapsed+=dt*(1/60);
  gameSpeed=Math.min(BASE_SPEED+elapsed*SPEED_ACCEL*60,MAX_SPEED);
  spdBar.style.width=((gameSpeed-BASE_SPEED)/(MAX_SPEED-BASE_SPEED)*100)+'%';

  const raw=Math.floor(elapsed*gameSpeed*2.5);
  if(raw>score){score=raw;checkMilestones();}
  dispScore+=(score-dispScore)*0.14*dt;
  const di=Math.floor(dispScore);
  if(scoreVal.textContent!==String(di)){
    scoreVal.textContent=di;
    if(di>0&&di%100===0){scoreVal.classList.remove('pop');void scoreVal.offsetWidth;scoreVal.classList.add('pop');}
  }

  if(Math.floor(elapsed)>Math.floor(elapsed-dt*(1/60))){
    const e=Math.floor(gameSpeed*0.4*cMult());fluxThisRun+=e;updateFluxHUD();
  }

  screenShake.power*=0.83;
  screenShake.x=(Math.random()-0.5)*screenShake.power;
  screenShake.y=(Math.random()-0.5)*screenShake.power;
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)resetCombo();}
  bgHue+=(bgHueTarget-bgHue)*0.06*dt;
  rainbowHue+=2.5*dt;skinHueOff+=1*dt;

  // Ability timer
  if(abilActive&&abilTimer>0){
    abilTimer-=dt;
    if(abilTimer<=0)endAbility();
  }
  if(player.ghostPhaseT>0)player.ghostPhaseT-=dt;
  else player.ghostPhased=false;
  if(ninjaClone){ninjaClone.life-=ninjaClone.decay;if(ninjaClone.life<=0)ninjaClone=null;}

  updateAbilHUD(dt);

  const ch=CHARS[SD.selChar];
  const wasOnGround=player.onGround;
  if(!player.onGround&&player.coyoteTimer>0)player.coyoteTimer-=dt;

  let grav=GRAVITY*ch.gravMult;
  if(player.vy>0)grav*=ch.fallMult;
  if(player.glideActive&&player.vy>0)grav*=(player.glideMult||0.5);
  if(player.dashing){
    grav*=0.08;player.dashTimer-=dt;player.dashTrailT+=dt;
    if(player.dashTrailT>=2){spawnDashTrail();player.dashTrailT=0;}
    if(player.dashTimer<=0){player.dashing=false;player.dashInvul=false;}
  }

  // Specter shrink: scale collision box
  const shrinkFactor=specterShrunk?0.5:1;
  const pw=PLAYER_W*shrinkFactor,ph=PLAYER_H*shrinkFactor;

  player.vy+=grav*dt;player.y+=player.vy*dt;
  player.squashV+=(1-player.squash)*0.25;player.squashV*=0.7;player.squash+=player.squashV;
  player.squash=Math.max(0.4,Math.min(1.45,player.squash));
  player.tilt=player.onGround?player.tilt*0.78:player.vy*0.022;

  const trailMax=8+Math.floor((gameSpeed-BASE_SPEED)/1.8);
  player.trail.unshift({x:player.x+PLAYER_W/2,y:player.y+PLAYER_H/2,dashing:player.dashing});
  if(player.trail.length>trailMax)player.trail.pop();

  player.onGround=false;
  for(const p of platforms){
    if(player.vy>=0&&player.x+pw>p.x&&player.x<p.x+p.w&&player.y+ph>=p.y&&player.y+ph<=p.y+p.h+player.vy+2){
      player.y=p.y-ph;player.vy=0;player.onGround=true;
      const ej=getUpgStat(SD.selChar,'extraJumps')||0;player.jumpsLeft=2+Math.floor(ej);
      player.dashing=false;player.glideActive=false;
      if(!wasOnGround){
        screenShake.power=Math.max(screenShake.power,1.5+gameSpeed*0.18);
        player.squash=0.5;player.squashV=0.12;spawnLandParts();sfxLand();updateJumpDots();addCombo();
      }
      player.coyoteTimer=0;
    }
  }
  if(wasOnGround&&!player.onGround&&player.vy>0){player.coyoteTimer=COYOTE_TIME;if(player.jumpsLeft<1)player.jumpsLeft=1;}
  if(player.jumpBuffer>0){player.jumpBuffer-=dt;if(player.onGround&&player.jumpsLeft>0){player.jumpBuffer=0;executeJump();}}

  if(player.y>H+80){killPlayer();return;}

  // Obstacle collision
  const px3=player.x+(PLAYER_W-pw)/2,py3=player.y+(PLAYER_H-ph);
  const pr={x:px3+3,y:py3+3,w:pw-6,h:ph-3};
  for(const o of obstacles){
    if(player.ghostPhased&&!o.phased){o.phased=true;continue;}
    if(player.dashInvul)continue;
    if(shieldActive){
      if(rectOvlp(pr,getOR(o))){
        shieldHits--;o.phased=true;
        floatText('BLOCKED!',player.x+PLAYER_W/2,player.y-22,'#66aaff',16);
        for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*4+2;addP(player.x+PLAYER_W/2,player.y+PLAYER_H/2,Math.cos(a)*sp,Math.sin(a)*sp,Math.random()*5+2,'#66aaff',0.045);}
        screenShake.power=5;
        if(shieldHits<=0){shieldActive=false;}
        continue;
      }
    }
    if(bubbleActive){
      if(rectOvlp(pr,getOR(o))){
        bubbleHitsLeft--;o.phased=true;
        const bon=getUpgStat('bubble','bubbleBonus')||0;
        if(bon>0){score+=bon;floatText(`+${bon}`,player.x+PLAYER_W/2,player.y-22,'#88eeff',14);}
        floatText('POP!',player.x+PLAYER_W/2,player.y-22,'#88eeff',18);
        for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*5+2;addP(player.x+PLAYER_W/2,player.y+PLAYER_H/2,Math.cos(a)*sp,Math.sin(a)*sp,Math.random()*6+2,'#88eeff',0.04);}
        screenShake.power=4;
        if(bubbleHitsLeft<=0){bubbleActive=false;}
        continue;
      }
    }
    if(rectOvlp(pr,getOR(o))){killPlayer();return;}
  }

  checkNearMisses();

  // Storm freezes obstacles
  const obstacleSpeed=stormActive?gameSpeed*0.1:gameSpeed;
  for(const p of platforms)p.x-=gameSpeed*dt;
  platforms=platforms.filter(p=>p.x+p.w>-50);
  const lp=platforms[platforms.length-1];
  if(!lp||lp.x+lp.w<W+100){
    const tier=Math.min(Math.floor(elapsed/5.5),6);
    const maxGap=72+tier*16;
    const gap=Math.random()<(0.28+tier*0.055)?randInt(65,maxGap):randInt(0,22);
    const startX=lp?lp.x+lp.w+gap:W,pw2=randInt(150,310);
    platforms.push({x:startX,y:GROUND_Y,w:pw2,h:PLAT_H});
    if(Math.random()<0.26+tier*0.06&&pw2>110)spawnObstacle(startX+randInt(45,pw2-75));
  }
  for(const o of obstacles)o.x-=obstacleSpeed*dt;
  obstacles=obstacles.filter(o=>o.x+80>0);

  for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.15*dt;p.life-=p.decay*dt;}
  particles=particles.filter(p=>p.life>0);
  for(const f of floatTexts){f.y-=1.6*dt;f.life-=0.02*dt;}
  floatTexts=floatTexts.filter(f=>f.life>0);
  spawnSkinFX();
  updateBackground(dt);
}

function killPlayer(){
  if(player.dead)return;
  if(checkPhoenixRevive())return;
  player.dead=true;spawnDeathParts();screenShake.power=18;resetCombo();
  setTimeout(showGameOver,940);
}

// ══════════════════════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════════════════════
function draw(){
  ctx.save();ctx.translate(screenShake.x,screenShake.y);
  drawBackground();
  ctx.strokeStyle=COL.grid;ctx.lineWidth=1;const gs=60;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GROUND_Y);ctx.stroke();}
  for(let y=0;y<GROUND_Y;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  for(const p of platforms)drawPlatform(p);
  for(const o of obstacles)drawObstacle(o);

  if(ninjaClone){ctx.save();ctx.globalAlpha=ninjaClone.life*0.35;ctx.fillStyle='#4444aa';ctx.shadowColor='#8888ff';ctx.shadowBlur=10;roundRect(ctx,ninjaClone.x,ninjaClone.y,PLAYER_W,PLAYER_H,6);ctx.fill();ctx.shadowBlur=0;ctx.restore();}

  // Ability aura drawings
  if(SD.selChar==='magnet'&&abilActive){
    ctx.save();ctx.globalAlpha=0.1+Math.sin(Date.now()/200)*0.05;ctx.strokeStyle='#ff44aa';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(player.x+PLAYER_W/2,player.y+PLAYER_H/2,55+Math.sin(Date.now()/300)*8,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.06;ctx.beginPath();ctx.arc(player.x+PLAYER_W/2,player.y+PLAYER_H/2,80+Math.sin(Date.now()/200)*10,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  if(shieldActive){
    ctx.save();ctx.globalAlpha=0.18+Math.sin(Date.now()/300)*0.08;ctx.strokeStyle='#66aaff';ctx.lineWidth=3;ctx.shadowColor='#66aaff';ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(player.x+PLAYER_W/2,player.y+PLAYER_H/2,26,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;ctx.restore();
  }
  if(bubbleActive){
    ctx.save();ctx.globalAlpha=0.15+Math.sin(Date.now()/400)*0.07;ctx.strokeStyle='#88eeff';ctx.lineWidth=3;ctx.shadowColor='#88eeff';ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(player.x+PLAYER_W/2,player.y+PLAYER_H/2,28,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;ctx.restore();
  }
  if(stormActive){
    ctx.save();ctx.globalAlpha=0.06;ctx.fillStyle='#ccddff';ctx.fillRect(0,0,W,GROUND_Y);ctx.restore();
  }
  if(specterShrunk){
    ctx.save();ctx.globalAlpha=0.12;ctx.strokeStyle='#aaffee';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.strokeRect(player.x,player.y+PLAYER_H/2,PLAYER_W,PLAYER_H/2);ctx.setLineDash([]);ctx.restore();
  }

  if(state==='play'&&!player.dead)drawTrail();

  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,p.size*p.life),0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  if(!player.dead)drawPlayer();
  for(const ft of floatTexts){
    ctx.globalAlpha=Math.max(0,ft.life);ctx.font=`bold ${ft.size}px 'Space Mono',monospace`;
    ctx.textAlign='center';ctx.lineWidth=3;ctx.strokeStyle='rgba(0,0,0,0.7)';
    ctx.strokeText(ft.text,ft.x,ft.y);ctx.fillStyle=ft.col;ctx.fillText(ft.text,ft.x,ft.y);
  }
  ctx.globalAlpha=1;ctx.textAlign='left';
  ctx.restore();
}

function drawPlatform(p){
  const bgId=SD.selBg;
  const ec=bgId==='city'?'#4488ff':bgId==='sunset'?'#ff8844':bgId==='ocean'?'#00aaff':bgId==='forest'?'#44ff44':bgId==='desert'?'#ffaa44':bgId==='arctic2'?'#aaccff':bgId==='volcano'?'#ff4422':COL.groundEdge;
  ctx.fillStyle=COL.ground;ctx.fillRect(p.x,p.y,p.w,p.h);
  ctx.strokeStyle=ec;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.w,p.y);ctx.stroke();
  const g=ctx.createLinearGradient(0,p.y,0,p.y+p.h);g.addColorStop(0,`${ec}12`);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(p.x,p.y,p.w,p.h);ctx.fillStyle='#0a0a0f';ctx.fillRect(p.x,p.y+p.h,p.w,H-(p.y+p.h));
}

function drawObstacle(o){
  if(o.stormFrozen){ctx.globalAlpha=0.7;}
  if(o.type==='spike'){
    ctx.fillStyle=o.stormFrozen?'#aabbff':COL.spike;ctx.shadowColor=o.stormFrozen?'#aabbff':COL.spike;ctx.shadowBlur=12;
    ctx.beginPath();ctx.moveTo(o.x+o.w/2,o.y);ctx.lineTo(o.x+o.w,o.y+o.h);ctx.lineTo(o.x,o.y+o.h);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  }else{
    ctx.fillStyle='#1a0a10';ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.strokeStyle=o.stormFrozen?'#aabbff':COL.wall;ctx.lineWidth=2;ctx.shadowColor=o.stormFrozen?'#aabbff':COL.wall;ctx.shadowBlur=8;
    ctx.strokeRect(o.x,o.y,o.w,o.h);ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,56,100,0.28)';ctx.lineWidth=1;
    for(let iy=o.y+6;iy<o.y+o.h;iy+=14){ctx.beginPath();ctx.moveTo(o.x+2,iy+6);ctx.lineTo(o.x+o.w/2,iy);ctx.lineTo(o.x+o.w-2,iy+6);ctx.stroke();}
  }
  ctx.globalAlpha=1;
}

function drawTrail(){
  const len=player.trail.length,spf=(gameSpeed-BASE_SPEED)/(MAX_SPEED-BASE_SPEED),col=getPC();
  for(let i=1;i<len;i++){
    const t=player.trail[i],alpha=(1-i/len)*(0.07+spf*0.17);
    ctx.globalAlpha=alpha;ctx.fillStyle=t.dashing?'#00cfff':col;
    const r=(PLAYER_W/2)*(1-i/len)*(0.45+spf*0.5);
    ctx.beginPath();ctx.arc(t.x,t.y,Math.max(0.5,r),0,Math.PI*2);ctx.fill();
  }ctx.globalAlpha=1;
}

function drawPlayer(){
  const ch=CHARS[SD.selChar],sk=SD.selSkin;
  const shrink=specterShrunk?0.5:1;
  const cx=player.x+PLAYER_W/2,cy=player.y+PLAYER_H*(1-shrink/2);
  const sw=PLAYER_W*player.squash*shrink,sh=PLAYER_H*(2-player.squash)*shrink;
  const col=getPC();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(player.tilt);
  if(player.ghostPhased)ctx.globalAlpha=0.35;
  if(SD.selChar==='specter'&&!specterShrunk)ctx.globalAlpha=0.75;

  ctx.shadowColor=player.dashing?'#00cfff':ch.glow;
  ctx.shadowBlur=player.dashing?28:(player.onGround?10:20);
  if(sk==='neon')ctx.shadowBlur+=16;
  if(sk==='gold'){ctx.shadowColor='#ffcc00';ctx.shadowBlur=24;}
  if(sk==='crystal'){ctx.shadowColor='#aaddff';ctx.shadowBlur=22;}
  if(sk==='hologram'){ctx.shadowColor='#00ffcc';ctx.shadowBlur=20;}
  if(sk==='obsidian'){ctx.shadowColor='#9933ff';ctx.shadowBlur=20;}
  if(sk==='volt'){ctx.shadowColor='#ffff00';ctx.shadowBlur=20;}
  if(sk==='cosmic'){ctx.shadowColor=col;ctx.shadowBlur=24;}
  if(abilActive&&!player.dashing){ctx.shadowColor=ch.glow;ctx.shadowBlur+=8;}
  ctx.fillStyle=col;

  const ha=sh/2,wa=sw/2;
  if(ch.shape==='diamond'){ctx.beginPath();ctx.moveTo(0,-ha);ctx.lineTo(wa,0);ctx.lineTo(0,ha);ctx.lineTo(-wa,0);ctx.closePath();ctx.fill();}
  else if(ch.shape==='arrow'){ctx.beginPath();ctx.moveTo(wa,0);ctx.lineTo(-wa/2,-ha);ctx.lineTo(-wa/2,-ha/2);ctx.lineTo(-wa,-ha/2);ctx.lineTo(-wa,ha/2);ctx.lineTo(-wa/2,ha/2);ctx.lineTo(-wa/2,ha);ctx.closePath();ctx.fill();}
  else if(ch.shape==='round'){ctx.beginPath();ctx.arc(0,0,Math.max(wa,ha)/1.4,0,Math.PI*2);ctx.fill();}
  else if(ch.shape==='star'){ctx.beginPath();for(let i=0;i<5;i++){const a=Math.PI/2+i*(Math.PI*2/5),ai=a+Math.PI/5;ctx.lineTo(Math.cos(a)*wa,-(Math.sin(a)*ha));ctx.lineTo(Math.cos(ai)*wa*0.45,-(Math.sin(ai)*ha*0.45));}ctx.closePath();ctx.fill();}
  else if(ch.shape==='wide'){ctx.fillRect(-wa-4,-ha+4,sw+8,sh-8);}
  else if(ch.shape==='slim'){ctx.fillRect(-wa+4,-ha,sw-8,sh);}
  else if(ch.shape==='flame'){ctx.beginPath();ctx.moveTo(0,-ha);ctx.bezierCurveTo(wa,-ha/2,wa,0,0,ha);ctx.bezierCurveTo(-wa,0,-wa,-ha/2,0,-ha);ctx.fill();}
  else if(ch.shape==='bouncy'){roundRect(ctx,-wa,-ha,sw,sh,10);ctx.fill();}
  else{roundRect(ctx,-wa,-ha,sw,sh,6);ctx.fill();}
  ctx.shadowBlur=0;

  if(sk==='pixel'){ctx.strokeStyle='rgba(0,0,0,0.26)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-wa,0);ctx.lineTo(wa,0);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-ha);ctx.lineTo(0,ha);ctx.stroke();}
  if(sk==='lava'){ctx.strokeStyle='rgba(255,100,0,0.5)';ctx.lineWidth=1;for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(-wa+i*8,-ha/2+i*10);ctx.lineTo(wa-i*6,ha/3+i*8);ctx.stroke();}}
  if(sk==='crystal'){ctx.fillStyle='rgba(255,255,255,0.22)';ctx.beginPath();ctx.moveTo(0,-ha);ctx.lineTo(wa*0.4,-ha*0.2);ctx.lineTo(0,-ha*0.5);ctx.closePath();ctx.fill();}
  if(sk==='obsidian'&&!player.dashing){ctx.strokeStyle='rgba(150,50,255,0.5)';ctx.lineWidth=1;ctx.strokeRect(-wa-2,-ha-2,sw+4,sh+4);}
  if(sk==='hologram'){ctx.globalAlpha=0.2;ctx.strokeStyle='#00ffcc';ctx.lineWidth=1;ctx.setLineDash([2,4]);ctx.strokeRect(-wa,-ha,sw,sh);ctx.setLineDash([]);}
  if(sk==='cosmic'){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.arc(-wa*0.3,-ha*0.3,wa*0.3,0,Math.PI*2);ctx.fill();}

  if(ch.shape!=='star'&&ch.shape!=='flame'){
    ctx.globalAlpha=1;ctx.fillStyle=ch.eyeColor||'#0a0a0f';
    ctx.beginPath();ctx.arc(wa-7,-ha+9,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.beginPath();ctx.arc(wa-5.5,-ha+7.5,1.5,0,Math.PI*2);ctx.fill();
  }
  if(player.jumpsLeft===0&&!player.onGround&&!player.dashing){ctx.strokeStyle='#ff3864';ctx.lineWidth=2;ctx.globalAlpha=0.45;ctx.strokeRect(-wa-3,-ha-3,sw+6,sh+6);ctx.globalAlpha=1;}
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ── Loop ──────────────────────────────────────────────────
function loop(ts){update(ts);draw();requestAnimationFrame(loop);}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

// ── Boot ──────────────────────────────────────────────────
load();
Object.keys(CHARS).forEach(id=>{if(!SD.upgrades[id])SD.upgrades[id]=0;});
if(!SD.chars.includes('runner'))SD.chars.push('runner');
if(!SD.skins.includes('default'))SD.skins.push('default');
if(!SD.bgs.includes('void'))SD.bgs.push('void');
// Validate selections still exist
if(!CHARS[SD.selChar])SD.selChar='runner';
if(!SKINS[SD.selSkin])SD.selSkin='default';
if(!BGS[SD.selBg])SD.selBg='void';
save();updateCharBadge();refreshCurrency();
initGame();
(function idle(ts){if(state==='start'||state==='shop'){ctx.save();ctx.translate(screenShake.x,screenShake.y);drawBackground();ctx.restore();updateBackground(0.5);}requestAnimationFrame(idle);})();
requestAnimationFrame(loop);
</script>
